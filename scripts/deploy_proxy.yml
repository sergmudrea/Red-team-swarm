# Ansible playbook to deploy a fronting Nginx proxy for Hive 2.0
# Target: Debian 12, minimal install
# Usage: ansible-playbook -i "proxy1.example.com," deploy_proxy.yml

- name: Deploy Hive fronting proxy
  hosts: all
  become: yes
  vars:
    domain: "proxy1.example.com"          # replace with actual domain
    backend_host: "10.0.0.1"             # internal IP of hive server
    backend_port: 8443
  tasks:

    - name: Install nginx and openssl
      ansible.builtin.apt:
        name:
          - nginx
          - openssl
        state: present
        update_cache: yes

    - name: Create directory for TLS certificates
      ansible.builtin.file:
        path: /etc/nginx/certs
        state: directory
        mode: '0700'

    - name: Generate self-signed TLS certificate (if not exists)
      ansible.builtin.shell:
        cmd: |
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /etc/nginx/certs/proxy.key \
            -out /etc/nginx/certs/proxy.crt \
            -subj "/CN={{ domain }}"
        creates: /etc/nginx/certs/proxy.crt

    - name: Copy cover website files
      ansible.builtin.copy:
        dest: /var/www/hive-cover/index.html
        content: |
          <!DOCTYPE html>
          <html><head><title>Under Maintenance</title></head>
          <body><h1>We'll be back soon.</h1></body></html>
        mode: '0644'
      notify: restart nginx

    - name: Configure Nginx as fronting proxy
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../configs/proxy_nginx.conf.j2"
        dest: /etc/nginx/sites-available/hive-proxy
        mode: '0644'
      notify: restart nginx

    - name: Enable site configuration
      ansible.builtin.file:
        src: /etc/nginx/sites-available/hive-proxy
        dest: /etc/nginx/sites-enabled/hive-proxy
        state: link
      notify: restart nginx

    - name: Disable default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    - name: Ensure nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
