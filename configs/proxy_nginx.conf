# Hive 2.0 — Fronting proxy configuration
# Masks WebSocket agent traffic behind a legitimate-looking static site.
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled.

server {
    listen 443 ssl http2;
    server_name proxy1.example.com;   # change to your actual domain

    # --- TLS configuration (use your real certificates in production) ---
    ssl_certificate     /etc/nginx/certs/proxy.crt;
    ssl_certificate_key /etc/nginx/certs/proxy.key;

    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # --- Static "cover" site ---
    root /var/www/hive-cover;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # --- WebSocket endpoint (agent <-> server) ---
    location /ws {
        proxy_pass https://<hive-backend>:8443;   # real hive server address
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;                # keep WebSocket open
        proxy_send_timeout 86400s;
    }
}
